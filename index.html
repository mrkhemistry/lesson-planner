<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mr Khemistry — Lesson Planner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --ink: #1a1a2e;
    --paper: #f5f2eb;
    --cream: #ede9df;
    --accent: #c84b31;
    --gold: #d4a853;
    --muted: #7a7468;
    --border: #d6d0c4;
    --white: #ffffff;
    --green: #2d6a4f;
    --green-light: #e8f4f0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; }

  /* LOADING */
  .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(245,242,235,0.75); z-index: 300; align-items: center; justify-content: center; gap: 0.6rem; font-size: 0.9rem; color: var(--muted); }
  .loading-overlay.visible { display: flex; }
  .spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--ink); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* HEADER */
  header { background: var(--ink); color: var(--paper); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; }
  .logo { font-family: 'DM Serif Display', serif; font-size: 1.2rem; }
  .logo span { color: var(--gold); }
  .header-meta { font-size: 0.78rem; color: #888; letter-spacing: 0.05em; text-transform: uppercase; }

  /* LAYOUT */
  .container { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem; }
  .term-bar { display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
  .term-bar h1 { font-family: 'DM Serif Display', serif; font-size: 1.8rem; flex: 1; }
  .term-tabs { display: flex; gap: 0.4rem; flex-wrap: wrap; }
  .term-tab { padding: 0.4rem 1rem; border: 1.5px solid var(--border); background: transparent; border-radius: 20px; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; cursor: pointer; color: var(--muted); transition: all 0.15s; }
  .term-tab.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .term-tab:hover:not(.active) { border-color: var(--ink); color: var(--ink); }
  .btn-add-lesson { display: flex; align-items: center; gap: 0.4rem; padding: 0.5rem 1.2rem; background: var(--accent); color: white; border: none; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: opacity 0.15s; white-space: nowrap; }
  .btn-add-lesson:hover { opacity: 0.85; }

  /* PROGRESS */
  .term-progress { background: var(--cream); border: 1.5px solid var(--border); border-radius: 10px; padding: 1.2rem 1.5rem; margin-bottom: 2rem; display: flex; align-items: center; gap: 2rem; flex-wrap: wrap; }
  .progress-stat { text-align: center; }
  .progress-stat .num { font-family: 'DM Serif Display', serif; font-size: 2rem; color: var(--ink); line-height: 1; }
  .progress-stat .label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 0.2rem; }
  .progress-bar-wrap { flex: 1; min-width: 200px; }
  .progress-bar-label { font-size: 0.8rem; color: var(--muted); margin-bottom: 0.4rem; display: flex; justify-content: space-between; }
  .progress-bar-bg { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--green); border-radius: 4px; transition: width 0.4s ease; }

  /* LESSON CARDS */
  .lessons-list { display: flex; flex-direction: column; gap: 0.8rem; }
  .lesson-card { background: var(--white); border: 1.5px solid var(--border); border-radius: 10px; overflow: hidden; transition: box-shadow 0.15s; }
  .lesson-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.07); }
  .lesson-card.done { opacity: 0.65; }
  .lesson-header { display: flex; align-items: center; padding: 1rem 1.2rem; gap: 1rem; cursor: pointer; user-select: none; }
  .week-badge { background: var(--ink); color: var(--paper); font-size: 0.7rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.25rem 0.6rem; border-radius: 4px; white-space: nowrap; min-width: 52px; text-align: center; }
  .lesson-card.done .week-badge { background: var(--green); }
  .lesson-title-area { flex: 1; }
  .lesson-title { font-weight: 600; font-size: 0.95rem; color: var(--ink); }
  .lesson-meta { font-size: 0.78rem; color: var(--muted); margin-top: 0.15rem; }
  .lesson-chips { display: flex; gap: 0.4rem; flex-wrap: wrap; }
  .chip { font-size: 0.72rem; padding: 0.2rem 0.55rem; border-radius: 12px; font-weight: 500; }
  .chip-hw { background: #fef3e2; color: #9a6310; }
  .chip-followup { background: #fde8e8; color: #9b2020; }
  .chip-done { background: var(--green-light); color: var(--green); }
  .expand-icon { color: var(--muted); font-size: 1.2rem; transition: transform 0.2s; line-height: 1; }
  .expanded .expand-icon { transform: rotate(180deg); }

  /* LESSON BODY */
  .lesson-body { display: none; padding: 0 1.2rem 1.2rem; border-top: 1px solid var(--border); }
  .lesson-body.open { display: block; }
  .lesson-body-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem; }
  @media (max-width: 600px) { .lesson-body-grid { grid-template-columns: 1fr; } }
  .field-group { display: flex; flex-direction: column; gap: 0.3rem; }
  .field-group.full { grid-column: 1 / -1; }
  label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); }
  input[type="text"], input[type="date"], textarea, select { font-family: 'DM Sans', sans-serif; font-size: 0.9rem; padding: 0.5rem 0.7rem; border: 1.5px solid var(--border); border-radius: 6px; background: var(--paper); color: var(--ink); width: 100%; transition: border-color 0.15s; }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--ink); }
  textarea { resize: vertical; min-height: 64px; }

  /* TIME BREAKDOWN */
  .time-breakdown { display: flex; flex-direction: column; gap: 0.4rem; }
  .time-row { display: flex; gap: 0.5rem; align-items: center; }
  .time-row input[type="text"] { flex: 1; }
  .time-row input[type="number"] { width: 70px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; padding: 0.5rem 0.7rem; border: 1.5px solid var(--border); border-radius: 6px; background: var(--paper); color: var(--ink); text-align: right; }
  .time-row input[type="number"]:focus { outline: none; border-color: var(--ink); }
  .time-min { font-size: 0.78rem; color: var(--muted); white-space: nowrap; }
  .btn-remove-row { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.1rem; padding: 0 0.2rem; line-height: 1; }
  .btn-remove-row:hover { color: var(--accent); }
  .time-total { font-size: 0.8rem; color: var(--muted); text-align: right; margin-top: 0.2rem; }
  .time-total.over { color: var(--accent); font-weight: 600; }
  .btn-add-row { align-self: flex-start; background: none; border: 1.5px dashed var(--border); color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 0.8rem; padding: 0.3rem 0.8rem; border-radius: 6px; cursor: pointer; margin-top: 0.2rem; transition: all 0.15s; }
  .btn-add-row:hover { border-color: var(--ink); color: var(--ink); }

  /* ACTIONS */
  .lesson-actions { display: flex; gap: 0.6rem; margin-top: 1rem; align-items: center; flex-wrap: wrap; }
  .btn-done { padding: 0.4rem 1rem; background: var(--green); color: white; border: none; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; cursor: pointer; transition: opacity 0.15s; }
  .btn-done:hover { opacity: 0.85; }
  .btn-undone { padding: 0.4rem 1rem; background: transparent; color: var(--green); border: 1.5px solid var(--green); border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; cursor: pointer; }
  .btn-delete { margin-left: auto; padding: 0.4rem 0.8rem; background: transparent; color: var(--muted); border: 1.5px solid var(--border); border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; cursor: pointer; transition: all 0.15s; }
  .btn-delete:hover { color: var(--accent); border-color: var(--accent); }
  .save-indicator { font-size: 0.75rem; color: var(--green); opacity: 0; transition: opacity 0.3s; }
  .save-indicator.show { opacity: 1; }

  /* EMPTY */
  .empty-state { text-align: center; padding: 4rem 2rem; color: var(--muted); }
  .empty-state .big { font-family: 'DM Serif Display', serif; font-size: 1.4rem; color: var(--ink); margin-bottom: 0.5rem; }
  .empty-state p { font-size: 0.9rem; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,26,46,0.5); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--white); border-radius: 12px; padding: 2rem; width: 90%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
  .modal h2 { font-family: 'DM Serif Display', serif; font-size: 1.4rem; margin-bottom: 1.2rem; }
  .modal-fields { display: flex; flex-direction: column; gap: 0.8rem; }
  .modal-actions { display: flex; gap: 0.6rem; margin-top: 1.5rem; justify-content: flex-end; }
  .btn-cancel { padding: 0.5rem 1.2rem; background: transparent; color: var(--muted); border: 1.5px solid var(--border); border-radius: 6px; font-family: 'DM Sans', sans-serif; cursor: pointer; }
  .btn-create { padding: 0.5rem 1.4rem; background: var(--accent); color: white; border: none; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <span id="loadingMsg">Loading…</span>
</div>

<header>
  <div class="logo">Mr <span>Khemistry</span></div>
  <div class="header-meta">Lesson Planner</div>
</header>

<div class="container">
  <div class="term-bar">
    <h1 id="termTitle">Term 1 · 2025</h1>
    <div class="term-tabs" id="termTabs"></div>
    <button class="btn-add-lesson" onclick="openModal()">+ Add Lesson</button>
  </div>

  <div class="term-progress">
    <div class="progress-stat"><div class="num" id="statDone">0</div><div class="label">Done</div></div>
    <div class="progress-stat"><div class="num" id="statTotal">0</div><div class="label">Total</div></div>
    <div class="progress-stat"><div class="num" id="statRemaining">0</div><div class="label">Remaining</div></div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-label"><span>Term Progress</span><span id="progressPct">0%</span></div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
    </div>
  </div>

  <div class="lessons-list" id="lessonsList"></div>
</div>

<!-- ADD LESSON MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>New Lesson</h2>
    <div class="modal-fields">
      <div class="field-group"><label>Topic / Title</label><input type="text" id="newTitle" placeholder="e.g. Electrochemistry — Electrolytic Cells"></div>
      <div class="field-group"><label>Lesson Date</label><input type="date" id="newDate"></div>
      <div class="field-group"><label>Term</label><select id="newTerm"></select></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-create" onclick="createLesson()">Create Lesson</button>
    </div>
  </div>
</div>

<script>
// ─── SUPABASE (no auth — personal use only) ───────────────────────────────────
const SUPABASE_URL = 'https://fvjqsohhitpnkvfirosc.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ2anFzb2hoaXRwbmt2Zmlyb3NjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQwOTgwMTgsImV4cCI6MjA1OTY3NDAxOH0.4D8-Y69RFLHaSVdpOxktxrqDMhGVGb0DWQOmXPX5v9g';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ─── STATE ────────────────────────────────────────────────────────────────────
const TERMS = ['Term 1 · 2025', 'Term 2 · 2025', 'Term 3 · 2025', 'Term 4 · 2025'];
let currentTerm = 0;
let lessons = [];
let saveTimers = {};

// ─── UTILS ────────────────────────────────────────────────────────────────────
function showLoading(msg) { document.getElementById('loadingMsg').textContent = msg || 'Loading…'; document.getElementById('loadingOverlay').classList.add('visible'); }
function hideLoading() { document.getElementById('loadingOverlay').classList.remove('visible'); }
function esc(s) { if (!s) return ''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function formatDate(d) { if (!d) return ''; return new Date(d+'T00:00:00').toLocaleDateString('en-SG', { weekday:'short', day:'numeric', month:'short', year:'numeric' }); }

// ─── INIT ─────────────────────────────────────────────────────────────────────
window.onload = async () => {
  // Build term tabs
  const tabs = document.getElementById('termTabs');
  TERMS.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'term-tab' + (i === 0 ? ' active' : '');
    btn.textContent = t.split(' · ')[0];
    btn.onclick = () => switchTerm(i);
    tabs.appendChild(btn);
  });

  // Build term select in modal
  const sel = document.getElementById('newTerm');
  TERMS.forEach((t, i) => {
    const o = document.createElement('option');
    o.value = i; o.textContent = t;
    sel.appendChild(o);
  });

  await loadTerm(0);
};

// ─── DATA ─────────────────────────────────────────────────────────────────────
async function loadTerm(termIdx) {
  showLoading('Loading lessons…');
  const { data, error } = await sb
    .from('lesson_plans')
    .select('*')
    .eq('term_index', termIdx)
    .order('week_number', { ascending: true });
  hideLoading();
  if (error) { console.error(error); return; }
  lessons = data || [];
  renderAll();
}

async function saveLesson(lesson) {
  const payload = {
    term_index: lesson.term_index,
    term_label: lesson.term_label,
    week_number: lesson.week_number,
    title: lesson.title || '',
    lesson_date: lesson.lesson_date || null,
    objectives: lesson.objectives || '',
    homework: lesson.homework || '',
    followup: lesson.followup || '',
    notes: lesson.notes || '',
    time_rows: lesson.time_rows || [],
    done: lesson.done || false
  };
  if (lesson.id) {
    const { error } = await sb.from('lesson_plans').update(payload).eq('id', lesson.id);
    if (error) console.error('Save error:', error);
    return lesson;
  } else {
    const { data, error } = await sb.from('lesson_plans').insert(payload).select().single();
    if (error) { console.error('Insert error:', error); return null; }
    return data;
  }
}

async function deleteLesson(idx) {
  if (!confirm('Delete this lesson?')) return;
  const lesson = lessons[idx];
  if (lesson.id) {
    const { error } = await sb.from('lesson_plans').delete().eq('id', lesson.id);
    if (error) { console.error(error); return; }
  }
  lessons.splice(idx, 1);
  renderAll();
}

// ─── NAVIGATION ───────────────────────────────────────────────────────────────
async function switchTerm(i) {
  currentTerm = i;
  document.querySelectorAll('.term-tab').forEach((b, idx) => b.classList.toggle('active', idx === i));
  document.getElementById('termTitle').textContent = TERMS[i];
  await loadTerm(i);
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function renderAll() { renderProgress(); renderLessons(); }

function renderProgress() {
  const total = lessons.length, done = lessons.filter(l => l.done).length;
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('statDone').textContent = done;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statRemaining').textContent = total - done;
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
}

function renderLessons() {
  const container = document.getElementById('lessonsList');
  if (!lessons.length) {
    container.innerHTML = `<div class="empty-state"><div class="big">No lessons yet</div><p>Click "+ Add Lesson" to plan your first lesson for ${TERMS[currentTerm]}.</p></div>`;
    return;
  }
  container.innerHTML = '';
  lessons.forEach((lesson, idx) => container.appendChild(buildCard(lesson, idx)));
}

function buildCard(lesson, idx) {
  const card = document.createElement('div');
  card.className = 'lesson-card' + (lesson.done ? ' done' : '');
  card.id = 'card-' + idx;

  const chips = [];
  if (lesson.done) chips.push('<span class="chip chip-done">&#10003; Done</span>');
  if (lesson.homework) chips.push('<span class="chip chip-hw">HW</span>');
  if (lesson.followup) chips.push('<span class="chip chip-followup">Follow-up</span>');

  const timeRows = (lesson.time_rows || []).map((r, ri) => `
    <div class="time-row">
      <input type="text" value="${esc(r.activity)}" placeholder="Activity"
        onchange="updateTimeRow(${idx},${ri},'activity',this.value)">
      <input type="number" value="${r.mins||''}" min="0" max="180" placeholder="0"
        onchange="updateTimeRow(${idx},${ri},'mins',this.value)">
      <span class="time-min">min</span>
      <button class="btn-remove-row" onclick="removeTimeRow(${idx},${ri})">&#215;</button>
    </div>`).join('');

  const totalMins = (lesson.time_rows || []).reduce((s, r) => s + (parseInt(r.mins)||0), 0);

  card.innerHTML = `
    <div class="lesson-header" onclick="toggleCard(${idx})">
      <span class="week-badge">Wk ${lesson.week_number}</span>
      <div class="lesson-title-area">
        <div class="lesson-title">${esc(lesson.title) || '<em style="color:#aaa">Untitled</em>'}</div>
        <div class="lesson-meta">${lesson.lesson_date ? formatDate(lesson.lesson_date) : 'No date set'}</div>
      </div>
      <div class="lesson-chips">${chips.join('')}</div>
      <span class="expand-icon">&#9662;</span>
    </div>
    <div class="lesson-body" id="body-${idx}">
      <div class="lesson-body-grid">
        <div class="field-group">
          <label>Lesson Title / Topic</label>
          <input type="text" value="${esc(lesson.title)}" placeholder="e.g. Electrochemistry"
            oninput="queueSave(${idx},'title',this.value)">
        </div>
        <div class="field-group">
          <label>Lesson Date</label>
          <input type="date" value="${lesson.lesson_date||''}"
            onchange="queueSave(${idx},'lesson_date',this.value)">
        </div>
        <div class="field-group full">
          <label>Learning Objectives</label>
          <textarea placeholder="What should students be able to do by end of lesson?"
            oninput="queueSave(${idx},'objectives',this.value)">${esc(lesson.objectives)}</textarea>
        </div>
        <div class="field-group full">
          <label>Time Breakdown</label>
          <div class="time-breakdown">${timeRows}</div>
          <div class="time-total${totalMins>120?' over':''}" id="timetotal-${idx}">${totalMins} / 120 min</div>
          <button class="btn-add-row" onclick="addTimeRow(${idx})">+ Add activity</button>
        </div>
        <div class="field-group">
          <label>Homework Assigned</label>
          <textarea placeholder="e.g. Practice Questions Pg 45-47"
            oninput="queueSave(${idx},'homework',this.value)">${esc(lesson.homework)}</textarea>
        </div>
        <div class="field-group">
          <label>Follow Up Next Lesson</label>
          <textarea placeholder="e.g. Recap Ksp before new topic"
            oninput="queueSave(${idx},'followup',this.value)">${esc(lesson.followup)}</textarea>
        </div>
        <div class="field-group full">
          <label>Notes / Reminders</label>
          <textarea placeholder="Anything else to remember..."
            oninput="queueSave(${idx},'notes',this.value)">${esc(lesson.notes)}</textarea>
        </div>
      </div>
      <div class="lesson-actions">
        ${lesson.done
          ? `<button class="btn-undone" onclick="toggleDone(${idx})">&#8617; Mark Undone</button>`
          : `<button class="btn-done" onclick="toggleDone(${idx})">&#10003; Mark as Done</button>`}
        <span class="save-indicator" id="saveind-${idx}">Saved &#10003;</span>
        <button class="btn-delete" onclick="deleteLesson(${idx})">Delete</button>
      </div>
    </div>`;
  return card;
}

// ─── INTERACTIONS ─────────────────────────────────────────────────────────────
function toggleCard(idx) {
  document.getElementById('body-'+idx).classList.toggle('open');
  document.getElementById('card-'+idx).classList.toggle('expanded');
}

function queueSave(idx, field, val) {
  lessons[idx][field] = val;
  clearTimeout(saveTimers[idx]);
  saveTimers[idx] = setTimeout(async () => {
    await saveLesson(lessons[idx]);
    flashSaved(idx);
    if (['homework','followup','done','title','lesson_date'].includes(field)) renderAll();
  }, 800);
}

function flashSaved(idx) {
  const el = document.getElementById('saveind-'+idx);
  if (!el) return;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

async function toggleDone(idx) {
  lessons[idx].done = !lessons[idx].done;
  await saveLesson(lessons[idx]);
  renderAll();
}

function reopenCard(idx) {
  setTimeout(() => {
    const b = document.getElementById('body-'+idx), c = document.getElementById('card-'+idx);
    if (b) { b.classList.add('open'); c.classList.add('expanded'); }
  }, 50);
}

async function addTimeRow(idx) {
  if (!lessons[idx].time_rows) lessons[idx].time_rows = [];
  lessons[idx].time_rows.push({ activity: '', mins: '' });
  await saveLesson(lessons[idx]);
  renderAll(); reopenCard(idx);
}

async function removeTimeRow(idx, ri) {
  lessons[idx].time_rows.splice(ri, 1);
  await saveLesson(lessons[idx]);
  renderAll(); reopenCard(idx);
}

function updateTimeRow(idx, ri, field, val) {
  lessons[idx].time_rows[ri][field] = val;
  clearTimeout(saveTimers['tr'+idx]);
  saveTimers['tr'+idx] = setTimeout(async () => {
    await saveLesson(lessons[idx]);
    flashSaved(idx);
  }, 800);
  const total = lessons[idx].time_rows.reduce((s, r) => s + (parseInt(r.mins)||0), 0);
  const el = document.getElementById('timetotal-'+idx);
  if (el) { el.textContent = total + ' / 120 min'; el.className = 'time-total' + (total > 120 ? ' over' : ''); }
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function openModal() {
  document.getElementById('newTerm').value = currentTerm;
  document.getElementById('newTitle').value = '';
  document.getElementById('newDate').value = '';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('newTitle').focus(), 100);
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

async function createLesson() {
  const title = document.getElementById('newTitle').value.trim();
  const lesson_date = document.getElementById('newDate').value || null;
  const termIdx = parseInt(document.getElementById('newTerm').value);

  const { count } = await sb
    .from('lesson_plans')
    .select('id', { count: 'exact', head: true })
    .eq('term_index', termIdx);

  const newLesson = {
    term_index: termIdx,
    term_label: TERMS[termIdx],
    week_number: (count || 0) + 1,
    title, lesson_date,
    objectives: '', homework: '', followup: '', notes: '',
    time_rows: [
      { activity: 'Recap / Warm-up', mins: '10' },
      { activity: 'Main Teaching', mins: '60' },
      { activity: 'Practice / Q&A', mins: '40' },
      { activity: 'Wrap-up', mins: '10' }
    ],
    done: false
  };

  showLoading('Creating lesson…');
  const saved = await saveLesson(newLesson);
  hideLoading();
  closeModal();

  if (termIdx !== currentTerm) await switchTerm(termIdx);
  else await loadTerm(currentTerm);
}
</script>
