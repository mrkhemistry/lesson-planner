<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mr Khemistry — Lesson Planner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    /* Dark theme base */
    --bg: #0f1117;
    --surface: #242840;
    --surface2: #2c3150;
    --surface3: #343a5a;
    --border: #424868;
    --border2: #505880;
    --text: #e8eaf0;
    --text2: #c8cde0;
    --text3: #6b7290;

    /* JC1: teal/cyan */
    --j1: #00c9b1;
    --j1-dim: #00796b;
    --j1-bg: #0d3330;
    --j1-border: #1a6b62;

    /* JC2: amber/orange */
    --j2: #ff8c42;
    --j2-dim: #b85c1a;
    --j2-bg: #2e1a0a;
    --j2-border: #7a4020;

    --green: #4caf7d;
    --green-bg: rgba(76,175,125,0.1);
    --red: #f06060;
    --gold: #f0c040;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* LOADING */
  .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(15,17,23,0.8); z-index: 300; align-items: center; justify-content: center; gap: 0.7rem; font-size: 0.9rem; color: var(--text2); }
  .loading-overlay.visible { display: flex; }
  .spinner { width: 20px; height: 20px; border: 2px solid var(--border2); border-top-color: var(--j1); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* HEADER */
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 58px; position: sticky; top: 0; z-index: 100; }
  .logo { font-family: 'DM Serif Display', serif; font-size: 1.2rem; color: var(--text); }
  .logo span { color: var(--gold); }
  .header-meta { font-size: 0.75rem; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; }

  /* LAYOUT */
  .container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

  /* TERM BAR */
  .term-bar { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .term-bar h1 { font-family: 'DM Serif Display', serif; font-size: 1.7rem; flex: 1; color: var(--text); }
  .term-tabs { display: flex; gap: 0.35rem; flex-wrap: wrap; }
  .term-tab { padding: 0.35rem 0.9rem; border: 1px solid var(--border2); background: transparent; border-radius: 20px; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; cursor: pointer; color: var(--text3); transition: all 0.15s; }
  .term-tab.active { background: var(--surface3); color: var(--text); border-color: var(--border2); }
  .term-tab:hover:not(.active) { border-color: var(--text3); color: var(--text2); }

  /* ADD BUTTONS */
  .add-row { display: flex; gap: 0.6rem; margin-bottom: 1.8rem; }
  .btn-add { display: flex; align-items: center; gap: 0.4rem; padding: 0.5rem 1.2rem; border: none; border-radius: 7px; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: opacity 0.15s; white-space: nowrap; }
  .btn-add:hover { opacity: 0.85; }
  .btn-add.j1 { background: var(--j1); color: #0a1a18; }
  .btn-add.j2 { background: var(--j2); color: #1a0e06; }

  /* PROGRESS */
  .progress-row { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
  .progress-box { flex: 1; min-width: 220px; border-radius: 10px; padding: 1rem 1.3rem; border: 1px solid; }
  .progress-box.j1 { background: var(--j1-bg); border-color: var(--j1-border); }
  .progress-box.j2 { background: var(--j2-bg); border-color: var(--j2-border); }
  .pb-title { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.7rem; }
  .progress-box.j1 .pb-title { color: var(--j1); }
  .progress-box.j2 .pb-title { color: var(--j2); }
  .pb-stats { display: flex; gap: 1.5rem; align-items: center; }
  .pb-stat .num { font-family: 'DM Serif Display', serif; font-size: 1.7rem; line-height: 1; color: #ffffff; }
  .pb-stat .lbl { font-size: 0.68rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; }
  .pb-bar-wrap { flex: 1; }
  .pb-pct-row { display: flex; justify-content: space-between; font-size: 0.72rem; color: var(--text2); margin-bottom: 0.35rem; }
  .pb-bar-bg { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .progress-box.j1 .pb-bar-fill { height: 100%; background: var(--j1); border-radius: 3px; transition: width 0.4s ease; }
  .progress-box.j2 .pb-bar-fill { height: 100%; background: var(--j2); border-radius: 3px; transition: width 0.4s ease; }

  /* WEEK SECTIONS */
  .week-section { margin-bottom: 2rem; }
  .week-label { font-size: 0.78rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); margin-bottom: 0.8rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
  .week-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  @media (max-width: 700px) { .week-columns { grid-template-columns: 1fr; } }
  .week-col { display: flex; flex-direction: column; gap: 0.6rem; }
  .col-header { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.28rem 0.7rem; border-radius: 4px; display: inline-block; margin-bottom: 0.3rem; }
  .col-header.j1 { background: var(--j1-bg); color: var(--j1); border: 1px solid var(--j1-border); }
  .col-header.j2 { background: var(--j2-bg); color: var(--j2); border: 1px solid var(--j2-border); }

  /* LESSON CARD */
  .lesson-card { border-radius: 10px; overflow: hidden; border: 1px solid; transition: box-shadow 0.15s, border-color 0.15s; }
  .lesson-card.j1 { background: var(--surface); border-color: var(--j1-border); }
  .lesson-card.j2 { background: var(--surface); border-color: var(--j2-border); }
  .lesson-card.j1:hover { border-color: var(--j1); box-shadow: 0 4px 20px rgba(0,201,177,0.15); }
  .lesson-card.j2:hover { border-color: var(--j2); box-shadow: 0 4px 20px rgba(255,140,66,0.15); }
  .lesson-card.done { opacity: 1; }

  .lesson-header { display: flex; align-items: center; padding: 0.8rem 1rem; gap: 0.8rem; cursor: pointer; user-select: none; }
  .lesson-card.j1 .lesson-header { background: var(--j1-bg); }
  .lesson-card.j2 .lesson-header { background: var(--j2-bg); }

  .level-badge { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.2rem 0.55rem; border-radius: 4px; white-space: nowrap; }
  .lesson-card.j1 .level-badge { background: var(--j1); color: #0a1a18; }
  .lesson-card.j2 .level-badge { background: var(--j2); color: #1a0e06; }
  .lesson-card.done .level-badge { background: var(--green) !important; color: #0a1a10 !important; }

  .lesson-title-area { flex: 1; min-width: 0; }
  .lesson-title { font-weight: 600; font-size: 0.88rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .lesson-meta { font-size: 0.72rem; color: var(--text3); margin-top: 0.1rem; }

  .lesson-chips { display: flex; gap: 0.3rem; flex-wrap: wrap; }
  .chip { font-size: 0.65rem; padding: 0.15rem 0.45rem; border-radius: 10px; font-weight: 600; }
  .chip-hw { background: rgba(240,192,64,0.15); color: var(--gold); border: 1px solid rgba(240,192,64,0.3); }
  .chip-followup { background: rgba(240,96,96,0.12); color: #f09090; border: 1px solid rgba(240,96,96,0.25); }
  .chip-done { background: var(--green-bg); color: var(--green); border: 1px solid rgba(76,175,125,0.3); }

  .expand-icon { color: var(--text3); font-size: 1rem; transition: transform 0.2s; line-height: 1; flex-shrink: 0; }
  .expanded .expand-icon { transform: rotate(180deg); }

  /* LESSON BODY */
  .lesson-body { display: none; padding: 0 1rem 1rem; background: var(--surface); }
  .lesson-body.open { display: block; }
  .lesson-body-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; margin-top: 0.9rem; }
  @media (max-width: 500px) { .lesson-body-grid { grid-template-columns: 1fr; } }
  .field-group { display: flex; flex-direction: column; gap: 0.3rem; }
  .field-group.full { grid-column: 1 / -1; }

  label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); }

  input[type="text"], textarea, select,
  input[type="number"] {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    padding: 0.5rem 0.7rem;
    border: 1px solid var(--border2);
    border-radius: 7px;
    background: var(--surface2);
    color: var(--text);
    width: 100%;
    transition: border-color 0.15s;
  }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--text3); }
  textarea { resize: vertical; min-height: 62px; }
  select option { background: var(--surface2); }

  /* TIME BREAKDOWN */
  .time-breakdown { display: flex; flex-direction: column; gap: 0.35rem; }
  .time-row { display: flex; gap: 0.4rem; align-items: center; }
  .time-row input[type="text"] { flex: 1; }
  .time-row input[type="number"] { width: 65px; text-align: right; }
  .time-min { font-size: 0.72rem; color: var(--text3); white-space: nowrap; }
  .btn-remove-row { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 1rem; padding: 0; line-height: 1; transition: color 0.15s; }
  .btn-remove-row:hover { color: var(--red); }
  .time-total { font-size: 0.73rem; color: var(--text3); text-align: right; margin-top: 0.2rem; }
  .time-total.over { color: var(--red); font-weight: 600; }
  .btn-add-row { align-self: flex-start; background: none; border: 1px dashed var(--border2); color: var(--text3); font-family: 'DM Sans', sans-serif; font-size: 0.78rem; padding: 0.28rem 0.7rem; border-radius: 6px; cursor: pointer; margin-top: 0.25rem; transition: all 0.15s; }
  .btn-add-row:hover { border-color: var(--text2); color: var(--text2); }

  /* ACTIONS */
  .lesson-actions { display: flex; gap: 0.5rem; margin-top: 1rem; align-items: center; flex-wrap: wrap; border-top: 1px solid var(--border); padding-top: 0.9rem; }
  .btn-save { padding: 0.4rem 1rem; border: none; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
  .btn-save:hover { opacity: 0.85; }
  .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }
  .lesson-card.j1 .btn-save { background: var(--j1); color: #0a1a18; }
  .lesson-card.j2 .btn-save { background: var(--j2); color: #1a0e06; }
  .btn-done { padding: 0.4rem 0.9rem; background: var(--green-bg); color: var(--green); border: 1px solid rgba(76,175,125,0.35); border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; cursor: pointer; transition: background 0.15s; }
  .btn-done:hover { background: rgba(76,175,125,0.2); }
  .btn-undone { padding: 0.4rem 0.9rem; background: transparent; color: var(--text3); border: 1px solid var(--border2); border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; cursor: pointer; }
  .btn-delete { margin-left: auto; padding: 0.4rem 0.7rem; background: transparent; color: var(--text3); border: 1px solid var(--border); border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; cursor: pointer; transition: all 0.15s; }
  .btn-delete:hover { color: var(--red); border-color: rgba(240,96,96,0.4); }
  .save-indicator { font-size: 0.75rem; color: var(--green); opacity: 0; transition: opacity 0.3s; }
  .save-indicator.show { opacity: 1; }
  .unsaved-dot { display: none; width: 7px; height: 7px; background: var(--j2); border-radius: 50%; flex-shrink: 0; }
  .unsaved-dot.visible { display: inline-block; }

  .empty-col { border: 1px dashed var(--border); border-radius: 8px; padding: 1.2rem; text-align: center; color: var(--text3); font-size: 0.8rem; }

  .empty-state { text-align: center; padding: 4rem 2rem; color: var(--text3); }
  .empty-state .big { font-family: 'DM Serif Display', serif; font-size: 1.4rem; color: var(--text2); margin-bottom: 0.5rem; }
  .empty-state p { font-size: 0.88rem; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(5,7,15,0.75); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: 14px; padding: 2rem; width: 90%; max-width: 400px; box-shadow: 0 24px 60px rgba(0,0,0,0.5); }
  .modal h2 { font-family: 'DM Serif Display', serif; font-size: 1.3rem; margin-bottom: 1.2rem; color: var(--text); }
  .modal-fields { display: flex; flex-direction: column; gap: 0.9rem; }
  .modal-actions { display: flex; gap: 0.6rem; margin-top: 1.5rem; justify-content: flex-end; }
  .btn-cancel { padding: 0.5rem 1.1rem; background: transparent; color: var(--text3); border: 1px solid var(--border2); border-radius: 7px; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: color 0.15s; }
  .btn-cancel:hover { color: var(--text); }
  .btn-create { padding: 0.5rem 1.3rem; border: none; border-radius: 7px; font-family: 'DM Sans', sans-serif; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
  .btn-create:hover { opacity: 0.85; }
  .btn-create.j1 { background: var(--j1); color: #0a1a18; }
  .btn-create.j2 { background: var(--j2); color: #1a0e06; }

  .level-toggle { display: flex; border: 1px solid var(--border2); border-radius: 7px; overflow: hidden; }
  .level-opt { flex: 1; padding: 0.5rem; text-align: center; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; cursor: pointer; border: none; background: transparent; color: var(--text3); font-weight: 600; transition: all 0.15s; }
  .level-opt.active.j1 { background: var(--j1); color: #0a1a18; }
  .level-opt.active.j2 { background: var(--j2); color: #1a0e06; }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <span id="loadingMsg">Loading…</span>
</div>

<header>
  <div class="logo">Mr <span>Khemistry</span></div>
  <div class="header-meta">Lesson Planner</div>
</header>

<div class="container">
  <div class="term-bar">
    <h1 id="termTitle">Term 1 · 2025</h1>
    <div class="term-tabs" id="termTabs"></div>
  </div>

  <div class="add-row">
    <button class="btn-add j1" onclick="openModal('JC1')">+ Add JC1 Lesson</button>
    <button class="btn-add j2" onclick="openModal('JC2')">+ Add JC2 Lesson</button>
  </div>

  <div class="progress-row">
    <div class="progress-box j1">
      <div class="pb-title">JC1 Progress</div>
      <div class="pb-stats">
        <div class="pb-stat"><div class="num" id="j1Done">0</div><div class="lbl">Done</div></div>
        <div class="pb-stat"><div class="num" id="j1Total">0</div><div class="lbl">Total</div></div>
        <div class="pb-bar-wrap">
          <div class="pb-pct-row"><span>Progress</span><span id="j1Pct">0%</span></div>
          <div class="pb-bar-bg"><div class="pb-bar-fill" id="j1Fill" style="width:0%"></div></div>
        </div>
      </div>
    </div>
    <div class="progress-box j2">
      <div class="pb-title">JC2 Progress</div>
      <div class="pb-stats">
        <div class="pb-stat"><div class="num" id="j2Done">0</div><div class="lbl">Done</div></div>
        <div class="pb-stat"><div class="num" id="j2Total">0</div><div class="lbl">Total</div></div>
        <div class="pb-bar-wrap">
          <div class="pb-pct-row"><span>Progress</span><span id="j2Pct">0%</span></div>
          <div class="pb-bar-bg"><div class="pb-bar-fill" id="j2Fill" style="width:0%"></div></div>
        </div>
      </div>
    </div>
  </div>

  <div id="weekSections"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">New Lesson</h2>
    <div class="modal-fields">
      <div class="field-group">
        <label>Level</label>
        <div class="level-toggle">
          <button class="level-opt j1 active" id="optJ1" onclick="setModalLevel('JC1')">JC1</button>
          <button class="level-opt j2" id="optJ2" onclick="setModalLevel('JC2')">JC2</button>
        </div>
      </div>
      <div class="field-group">
        <label>Week Number</label>
        <input type="number" id="newWeek" min="1" max="20" value="1">
      </div>
      <div class="field-group">
        <label>Topic / Title</label>
        <input type="text" id="newTitle" placeholder="e.g. Electrochemistry — Electrolytic Cells">
      </div>
      <div class="field-group">
        <label>Term</label>
        <select id="newTerm"></select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-create j1" id="createBtn" onclick="createLesson()">Create Lesson</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://fvjqsohhitpnkvfirosc.supabase.co';
const SUPABASE_KEY = 'sb_publishable_xwEiareEvHfeAEs9RciKlA_TtlIyH-j';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const TERMS = ['Term 1 · 2025', 'Term 2 · 2025', 'Term 3 · 2025', 'Term 4 · 2025'];
let currentTerm = 0;
let lessons = [];
let modalLevel = 'JC1';

function showLoading(msg) { document.getElementById('loadingMsg').textContent = msg || 'Loading…'; document.getElementById('loadingOverlay').classList.add('visible'); }
function hideLoading() { document.getElementById('loadingOverlay').classList.remove('visible'); }
function esc(s) { if (!s) return ''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

window.onload = async () => {
  const tabs = document.getElementById('termTabs');
  TERMS.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'term-tab' + (i === 0 ? ' active' : '');
    btn.textContent = t.split(' · ')[0];
    btn.onclick = () => switchTerm(i);
    tabs.appendChild(btn);
  });
  const sel = document.getElementById('newTerm');
  TERMS.forEach((t, i) => { const o = document.createElement('option'); o.value = i; o.textContent = t; sel.appendChild(o); });
  await loadTerm(0);
};

async function loadTerm(termIdx) {
  showLoading('Loading lessons…');
  const { data, error } = await sb.from('lesson_plans').select('*').eq('term_index', termIdx).order('week_number').order('level');
  hideLoading();
  if (error) { console.error(error); return; }
  lessons = data || [];
  renderAll();
}

async function switchTerm(i) {
  currentTerm = i;
  document.querySelectorAll('.term-tab').forEach((b, idx) => b.classList.toggle('active', idx === i));
  document.getElementById('termTitle').textContent = TERMS[i];
  await loadTerm(i);
}

function renderAll() { renderProgress(); renderWeeks(); }

function renderProgress() {
  const j1 = lessons.filter(l => l.level === 'JC1');
  const j2 = lessons.filter(l => l.level === 'JC2');
  const j1done = j1.filter(l => l.done).length;
  const j2done = j2.filter(l => l.done).length;
  const j1pct = j1.length ? Math.round(j1done/j1.length*100) : 0;
  const j2pct = j2.length ? Math.round(j2done/j2.length*100) : 0;
  document.getElementById('j1Done').textContent = j1done;
  document.getElementById('j1Total').textContent = j1.length;
  document.getElementById('j1Pct').textContent = j1pct + '%';
  document.getElementById('j1Fill').style.width = j1pct + '%';
  document.getElementById('j2Done').textContent = j2done;
  document.getElementById('j2Total').textContent = j2.length;
  document.getElementById('j2Pct').textContent = j2pct + '%';
  document.getElementById('j2Fill').style.width = j2pct + '%';
}

function renderWeeks() {
  const container = document.getElementById('weekSections');
  if (!lessons.length) {
    container.innerHTML = '<div class="empty-state"><div class="big">No lessons yet</div><p>Click "+ Add JC1 Lesson" or "+ Add JC2 Lesson" to get started.</p></div>';
    return;
  }
  const weeks = [...new Set(lessons.map(l => l.week_number))].sort((a,b) => a-b);
  container.innerHTML = '';
  weeks.forEach(wk => {
    const j1lessons = lessons.filter(l => l.week_number === wk && l.level === 'JC1');
    const j2lessons = lessons.filter(l => l.week_number === wk && l.level === 'JC2');
    const section = document.createElement('div');
    section.className = 'week-section';
    section.innerHTML = `
      <div class="week-label">Week ${wk}</div>
      <div class="week-columns">
        <div class="week-col">
          <div class="col-header j1">JC1</div>
          <div id="j1-wk${wk}"></div>
        </div>
        <div class="week-col">
          <div class="col-header j2">JC2</div>
          <div id="j2-wk${wk}"></div>
        </div>
      </div>`;
    container.appendChild(section);
    const j1col = document.getElementById('j1-wk'+wk);
    const j2col = document.getElementById('j2-wk'+wk);
    if (j1lessons.length) j1lessons.forEach(l => j1col.appendChild(buildCard(l)));
    else j1col.innerHTML = '<div class="empty-col">No JC1 lesson this week</div>';
    if (j2lessons.length) j2lessons.forEach(l => j2col.appendChild(buildCard(l)));
    else j2col.innerHTML = '<div class="empty-col">No JC2 lesson this week</div>';
  });
}

function getLessonIdx(id) { return lessons.findIndex(l => String(l.id) === String(id)); }

function buildCard(lesson) {
  const lvl = lesson.level === 'JC1' ? 'j1' : 'j2';
  const id = lesson.id;
  const card = document.createElement('div');
  card.className = `lesson-card ${lvl}${lesson.done ? ' done' : ''}`;
  card.id = 'card-' + id;

  const chips = [];
  if (lesson.done) chips.push('<span class="chip chip-done">&#10003; Done</span>');
  if (lesson.homework) chips.push('<span class="chip chip-hw">HW</span>');
  if (lesson.followup) chips.push('<span class="chip chip-followup">Follow-up</span>');

  const timeRows = (lesson.time_rows || []).map((r, ri) => `
    <div class="time-row">
      <input type="text" value="${esc(r.activity)}" placeholder="Activity" oninput="markUnsaved('${id}')">
      <input type="number" value="${r.mins||''}" min="0" max="180" placeholder="0" oninput="updateTimeTotal('${id}')">
      <span class="time-min">min</span>
      <button class="btn-remove-row" onclick="removeTimeRow('${id}',${ri})">&#215;</button>
    </div>`).join('');
  const totalMins = (lesson.time_rows || []).reduce((s, r) => s + (parseInt(r.mins)||0), 0);

  card.innerHTML = `
    <div class="lesson-header" onclick="toggleCard('${id}')">
      <span class="level-badge">${lesson.level}</span>
      <div class="lesson-title-area">
        <div class="lesson-title">${esc(lesson.title) || '<em style="color:var(--text3)">Untitled</em>'}</div>
        <div class="lesson-meta">Week ${lesson.week_number}</div>
      </div>
      <div class="lesson-chips">${chips.join('')}</div>
      <span class="expand-icon">&#9662;</span>
    </div>
    <div class="lesson-body" id="body-${id}">
      <div class="lesson-body-grid">
        <div class="field-group full">
          <label>Lesson Title / Topic</label>
          <input type="text" class="field-title" value="${esc(lesson.title)}" placeholder="e.g. Electrochemistry" oninput="markUnsaved('${id}')">
        </div>
        <div class="field-group full">
          <label>Learning Objectives</label>
          <textarea class="field-objectives" placeholder="What should students be able to do by end of lesson?" oninput="markUnsaved('${id}')">${esc(lesson.objectives)}</textarea>
        </div>
        <div class="field-group full">
          <label>Time Breakdown</label>
          <div class="time-breakdown" id="timebreakdown-${id}">${timeRows}</div>
          <div class="time-total${totalMins>120?' over':''}" id="timetotal-${id}">${totalMins} / 120 min</div>
          <button class="btn-add-row" onclick="addTimeRow('${id}')">+ Add activity</button>
        </div>
        <div class="field-group">
          <label>Homework Assigned</label>
          <textarea class="field-homework" placeholder="e.g. Practice Questions Pg 45-47" oninput="markUnsaved('${id}')">${esc(lesson.homework)}</textarea>
        </div>
        <div class="field-group">
          <label>Follow Up Next Lesson</label>
          <textarea class="field-followup" placeholder="e.g. Recap Ksp before next lesson" oninput="markUnsaved('${id}')">${esc(lesson.followup)}</textarea>
        </div>
        <div class="field-group full">
          <label>Notes / Reminders</label>
          <textarea class="field-notes" placeholder="Anything else to remember..." oninput="markUnsaved('${id}')">${esc(lesson.notes)}</textarea>
        </div>
      </div>
      <div class="lesson-actions">
        <button class="btn-save" id="savebtn-${id}" onclick="saveCard('${id}')">Save</button>
        <span class="save-indicator" id="saveind-${id}">Saved &#10003;</span>
        <span class="unsaved-dot" id="dot-${id}" title="Unsaved changes"></span>
        ${lesson.done
          ? `<button class="btn-undone" onclick="toggleDone('${id}')">&#8617; Mark Undone</button>`
          : `<button class="btn-done" onclick="toggleDone('${id}')">&#10003; Mark as Done</button>`}
        <button class="btn-delete" onclick="deleteLesson('${id}')">Delete</button>
      </div>
    </div>`;
  return card;
}

function toggleCard(id) {
  document.getElementById('body-'+id).classList.toggle('open');
  document.getElementById('card-'+id).classList.toggle('expanded');
}

function markUnsaved(id) {
  const dot = document.getElementById('dot-'+id);
  if (dot) dot.classList.add('visible');
}

function collectFormData(id) {
  const card = document.getElementById('card-'+id);
  const timeRowEls = card.querySelectorAll('.time-row');
  return {
    title: card.querySelector('.field-title').value,
    objectives: card.querySelector('.field-objectives').value,
    homework: card.querySelector('.field-homework').value,
    followup: card.querySelector('.field-followup').value,
    notes: card.querySelector('.field-notes').value,
    time_rows: Array.from(timeRowEls).map(row => ({
      activity: row.querySelector('input[type="text"]').value,
      mins: row.querySelector('input[type="number"]').value
    }))
  };
}

async function saveCard(id) {
  const idx = getLessonIdx(id);
  if (idx === -1) return;
  Object.assign(lessons[idx], collectFormData(id));
  const btn = document.getElementById('savebtn-'+id);
  if (btn) { btn.textContent = 'Saving…'; btn.disabled = true; }
  const { error } = await sb.from('lesson_plans').update({
    title: lessons[idx].title || '',
    objectives: lessons[idx].objectives || '',
    homework: lessons[idx].homework || '',
    followup: lessons[idx].followup || '',
    notes: lessons[idx].notes || '',
    time_rows: lessons[idx].time_rows || [],
    done: lessons[idx].done || false
  }).eq('id', id);
  if (btn) { btn.textContent = 'Save'; btn.disabled = false; }
  if (error) { console.error(error); alert('Save failed. Please try again.'); return; }
  const ind = document.getElementById('saveind-'+id);
  if (ind) { ind.classList.add('show'); setTimeout(() => ind.classList.remove('show'), 2000); }
  const dot = document.getElementById('dot-'+id);
  if (dot) dot.classList.remove('visible');
  // Update header title and chips without collapsing
  const titleEl = document.querySelector('#card-'+id+' .lesson-title');
  if (titleEl) titleEl.innerHTML = esc(lessons[idx].title) || '<em style="color:var(--text3)">Untitled</em>';
  const chipsEl = document.querySelector('#card-'+id+' .lesson-chips');
  if (chipsEl) {
    const chips = [];
    if (lessons[idx].done) chips.push('<span class="chip chip-done">&#10003; Done</span>');
    if (lessons[idx].homework) chips.push('<span class="chip chip-hw">HW</span>');
    if (lessons[idx].followup) chips.push('<span class="chip chip-followup">Follow-up</span>');
    chipsEl.innerHTML = chips.join('');
  }
  renderProgress();
}

async function toggleDone(id) {
  const idx = getLessonIdx(id);
  if (idx === -1) return;
  lessons[idx].done = !lessons[idx].done;
  await sb.from('lesson_plans').update({ done: lessons[idx].done }).eq('id', id);
  const card = document.getElementById('card-'+id);
  if (lessons[idx].done) card.classList.add('done'); else card.classList.remove('done');
  const badge = card.querySelector('.level-badge');
  if (badge) badge.style.background = lessons[idx].done ? 'var(--green)' : '';
  const chipsEl = card.querySelector('.lesson-chips');
  if (chipsEl) {
    const chips = [];
    if (lessons[idx].done) chips.push('<span class="chip chip-done">&#10003; Done</span>');
    if (lessons[idx].homework) chips.push('<span class="chip chip-hw">HW</span>');
    if (lessons[idx].followup) chips.push('<span class="chip chip-followup">Follow-up</span>');
    chipsEl.innerHTML = chips.join('');
  }
  const actionsEl = document.querySelector('#body-'+id+' .lesson-actions');
  if (actionsEl) {
    const btn = actionsEl.querySelector('.btn-done, .btn-undone');
    if (btn) btn.outerHTML = lessons[idx].done
      ? `<button class="btn-undone" onclick="toggleDone('${id}')">&#8617; Mark Undone</button>`
      : `<button class="btn-done" onclick="toggleDone('${id}')">&#10003; Mark as Done</button>`;
  }
  renderProgress();
}

async function deleteLesson(id) {
  if (!confirm('Delete this lesson?')) return;
  const { error } = await sb.from('lesson_plans').delete().eq('id', id);
  if (error) { console.error(error); return; }
  lessons = lessons.filter(l => String(l.id) !== String(id));
  renderAll();
}

function addTimeRow(id) {
  const idx = getLessonIdx(id);
  if (idx === -1) return;
  const card = document.getElementById('card-'+id);
  lessons[idx].time_rows = Array.from(card.querySelectorAll('.time-row')).map(row => ({
    activity: row.querySelector('input[type="text"]').value,
    mins: row.querySelector('input[type="number"]').value
  }));
  lessons[idx].time_rows.push({ activity: '', mins: '' });
  renderTimeRows(id); markUnsaved(id);
}

function removeTimeRow(id, ri) {
  const idx = getLessonIdx(id);
  if (idx === -1) return;
  const card = document.getElementById('card-'+id);
  lessons[idx].time_rows = Array.from(card.querySelectorAll('.time-row')).map(row => ({
    activity: row.querySelector('input[type="text"]').value,
    mins: row.querySelector('input[type="number"]').value
  }));
  lessons[idx].time_rows.splice(ri, 1);
  renderTimeRows(id); markUnsaved(id);
}

function renderTimeRows(id) {
  const idx = getLessonIdx(id);
  const container = document.getElementById('timebreakdown-'+id);
  if (!container) return;
  container.innerHTML = (lessons[idx].time_rows || []).map((r, ri) => `
    <div class="time-row">
      <input type="text" value="${esc(r.activity)}" placeholder="Activity" oninput="markUnsaved('${id}')">
      <input type="number" value="${r.mins||''}" min="0" max="180" placeholder="0" oninput="updateTimeTotal('${id}')">
      <span class="time-min">min</span>
      <button class="btn-remove-row" onclick="removeTimeRow('${id}',${ri})">&#215;</button>
    </div>`).join('');
  updateTimeTotal(id);
}

function updateTimeTotal(id) {
  const card = document.getElementById('card-'+id);
  if (!card) return;
  const total = Array.from(card.querySelectorAll('.time-row input[type="number"]')).reduce((s, el) => s + (parseInt(el.value)||0), 0);
  const el = document.getElementById('timetotal-'+id);
  if (el) { el.textContent = total + ' / 120 min'; el.className = 'time-total' + (total > 120 ? ' over' : ''); }
  markUnsaved(id);
}

function setModalLevel(lvl) {
  modalLevel = lvl;
  document.getElementById('optJ1').classList.toggle('active', lvl === 'JC1');
  document.getElementById('optJ2').classList.toggle('active', lvl === 'JC2');
  document.getElementById('createBtn').className = 'btn-create ' + (lvl === 'JC1' ? 'j1' : 'j2');
}

function openModal(lvl) {
  modalLevel = lvl || 'JC1';
  setModalLevel(modalLevel);
  document.getElementById('newTerm').value = currentTerm;
  document.getElementById('newTitle').value = '';
  const existing = lessons.filter(l => l.level === modalLevel).map(l => l.week_number);
  document.getElementById('newWeek').value = existing.length ? Math.max(...existing) + 1 : 1;
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('newTitle').focus(), 100);
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

async function createLesson() {
  const title = document.getElementById('newTitle').value.trim();
  const week_number = parseInt(document.getElementById('newWeek').value) || 1;
  const termIdx = parseInt(document.getElementById('newTerm').value);
  const newLesson = {
    term_index: termIdx, term_label: TERMS[termIdx],
    week_number, level: modalLevel, title, lesson_date: null,
    objectives: '', homework: '', followup: '', notes: '',
    time_rows: [
      { activity: 'Recap / Warm-up', mins: '10' },
      { activity: 'Main Teaching', mins: '60' },
      { activity: 'Practice / Q&A', mins: '40' },
      { activity: 'Wrap-up', mins: '10' }
    ],
    done: false
  };
  showLoading('Creating lesson…');
  const { data, error } = await sb.from('lesson_plans').insert(newLesson).select().single();
  hideLoading();
  if (error) { console.error(error); alert('Could not create lesson.'); return; }
  closeModal();
  if (termIdx !== currentTerm) await switchTerm(termIdx);
  else await loadTerm(currentTerm);
}
</script>
</body>
